<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-label="SeeingPower industrial plant with blue sky and energy light trails">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eaf8ff"/>
      <stop offset="0.34" stop-color="#bfe9ff"/>
      <stop offset="0.72" stop-color="#148bd4"/>
      <stop offset="1" stop-color="#0062a9"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5d768d"/>
      <stop offset="0.16" stop-color="#f5fbff"/>
      <stop offset="0.36" stop-color="#88a7bd"/>
      <stop offset="0.58" stop-color="#e9f6ff"/>
      <stop offset="1" stop-color="#38566d"/>
    </linearGradient>
    <linearGradient id="darkSteel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#19344c"/>
