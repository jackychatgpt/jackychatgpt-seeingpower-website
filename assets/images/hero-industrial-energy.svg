    <path d="M130 395 H900" stroke="#b9cad9" stroke-width="14" stroke-linecap="round" opacity="0.72"/>
  </g>

  <g transform="translate(940 498)" filter="url(#hardShadow)">
    <path d="M82 0 H132 V142 C132 170 170 208 188 258 C206 310 166 344 108 344 H-6 C-66 344 -105 310 -86 258 C-68 208 -30 170 -30 142 V0 H20 V134 C20 180 -18 217 -35 262 C-45 290 -22 304 18 304 H84 C124 304 146 290 136 262 C120 217 82 180 82 134 Z" fill="url(#glass)" stroke="#e8fbff" stroke-width="7" opacity="0.92"/>
