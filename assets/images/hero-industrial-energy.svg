<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Realistic chemical plant with subtle moving blue and yellow light streaks">
  <defs>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="leftShade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#031332" stop-opacity="0.82"/>
      <stop offset="0.42" stop-color="#06265f" stop-opacity="0.48"/>
      <stop offset="0.78" stop-color="#06265f" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#06265f" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="blueLight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#25b7ff" stop-opacity="0"/>
      <stop offset="0.32" stop-color="#6fe1ff" stop-opacity="0.82"/>
      <stop offset="0.56" stop-color="#ffffff" stop-opacity="0.62"/>
      <stop offset="1" stop-color="#25b7ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="yellowLight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb13b" stop-opacity="0"/>
      <stop offset="0.38" stop-color="#ffb13b" stop-opacity="0.88"/>
      <stop offset="0.58" stop-color="#fff4bd" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#ffb13b" stop-opacity="0"/>
    </linearGradient>
    <style>
      .photo { animation: photoBreath 10s ease-in-out infinite; transform-origin: 50% 50%; }
      .light-a { animation: lightFlowA 10s ease-in-out infinite; }
      .light-b { animation: lightFlowB 10s ease-in-out infinite; }
      .light-c { animation: lightFlowC 10s ease-in-out infinite; }
      .spark { animation: sparkSoft 4.8s ease-in-out infinite; transform-origin: center; }
      .spark.s2 { animation-delay: -1.2s; }
      .spark.s3 { animation-delay: -2.4s; }
      @keyframes photoBreath {
        0%,100% { transform: scale(1.012); filter: saturate(1.05) brightness(1); }
        50% { transform: scale(1.018); filter: saturate(1.08) brightness(1.015); }
      }
      @keyframes lightFlowA { 0%,100% { transform: translateX(-26px); opacity: .42; } 50% { transform: translateX(32px); opacity: .78; } }
      @keyframes lightFlowB { 0%,100% { transform: translateX(24px); opacity: .36; } 50% { transform: translateX(-34px); opacity: .7; } }
      @keyframes lightFlowC { 0%,100% { transform: translateX(-12px); opacity: .24; } 50% { transform: translateX(18px); opacity: .48; } }
      @keyframes sparkSoft { 0%,100% { transform: scale(.82); opacity: .18; } 50% { transform: scale(1.12); opacity: .58; } }
    </style>
  </defs>
  <rect width="1600" height="900" fill="#061b42"/>
  <image class="photo" x="0" y="0" width="1600" height="900" preserveAspectRatio="xMidYMid slice" href="data:image/jpeg;base64,"/>
  <rect width="1600" height="900" fill="url(#leftShade)"/>
  <rect width="1600" height="900" fill="#061b42" opacity="0.08"/>
  <g filter="url(#softGlow)">
    <path class="light-a" d="M-180 638 C120 636 390 628 655 620 C930 612 1190 590 1780 565" stroke="url(#blueLight)" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.66"/>
    <path class="light-b" d="M-180 690 C180 682 460 660 760 638 C1060 615 1325 590 1780 568" stroke="url(#blueLight)" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.52"/>
    <path class="light-a" d="M-180 842 C120 790 430 745 700 705 C970 665 1220 632 1780 598" stroke="url(#yellowLight)" stroke-width="9" stroke-linecap="round" fill="none" opacity="0.58"/>
    <path class="light-c" d="M-180 795 C130 754 430 718 725 682 C1030 646 1290 618 1780 590" stroke="#ffffff" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.28"/>
    <circle class="spark" cx="720" cy="618" r="7" fill="#78e4ff" opacity="0.42"/>
    <circle class="spark s2" cx="930" cy="668" r="6" fill="#ffe7a6" opacity="0.36"/>
    <circle class="spark s3" cx="1180" cy="606" r="6" fill="#7be9ff" opacity="0.34"/>
  </g>
</svg>
