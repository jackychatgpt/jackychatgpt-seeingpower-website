<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Chemical plant with laboratory glassware and energy trails">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8f7ff"/>
      <stop offset="0.42" stop-color="#8ccdf3"/>
      <stop offset="1" stop-color="#f6fcff"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.42" stop-color="#bfd0dd"/>
      <stop offset="1" stop-color="#637b91"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.78"/>
      <stop offset="0.45" stop-color="#d9f6ff" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#83d9ff" stop-opacity="0.26"/>
    </linearGradient>
    <linearGradient id="liquid" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0b68b7" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#5cd25a" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="orangeTrail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fff" stop-opacity="0"/>
      <stop offset="0.35" stop-color="#ffd16b" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#13a6ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="blueGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0b68b7" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#13a6ff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#61d34d" stop-opacity="0.72"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hardShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0b2d55" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>
  <circle cx="1095" cy="214" r="82" fill="#ffe1a8" opacity="0.52"/>
  <circle cx="1120" cy="210" r="128" fill="#fff" opacity="0.28"/>
