<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Realistic chemical plant, laboratory bottles and pulsing industrial energy">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="blueWash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#061a43" stop-opacity="0.72"/>
      <stop offset="0.45" stop-color="#0b68b7" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="energy" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.28" stop-color="#1fb5ff" stop-opacity="0.95"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="0.72" stop-color="#ffb84d" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#49d05a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="greenPulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#49d05a" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#49d05a" stop-opacity="1"/>
      <stop offset="1" stop-color="#1fb5ff" stop-opacity="0"/>
    </linearGradient>
    <style>
      .photo { transform-origin: 50% 50%; animation: photoMove 9s ease-in-out infinite alternate; }
      .light { animation: lightSweep 2.4s linear infinite; }
      .light.two { animation-duration: 3.2s; animation-delay: -1.1s; }
      .spark { animation: sparkBeat 1.4s ease-in-out infinite; transform-origin: center; }
      .spark.two { animation-delay: .35s; }
      .spark.three { animation-delay: .7s; }
      .pulse { stroke-dasharray: 118 820; animation: pulseRun 2s linear infinite; }
      @keyframes photoMove { 0% { transform: scale(1.08) translate(-10px, 4px); filter: saturate(1.04) brightness(1); } 100% { transform: scale(1.16) translate(-42px, -12px); filter: saturate(1.18) brightness(1.08); } }
      @keyframes lightSweep { 0% { transform: translateX(-260px); opacity: .15; } 30% { opacity: .95; } 100% { transform: translateX(420px); opacity: .2; } }
      @keyframes sparkBeat { 0%,100% { transform: scale(.72); opacity: .35; } 50% { transform: scale(1.45); opacity: 1; } }
      @keyframes pulseRun { 0% { stroke-dashoffset: 880; opacity: .35; } 45% { opacity: 1; } 100% { stroke-dashoffset: 0; opacity: .42; } }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#061a43"/>
  <image class="photo" x="-120" y="-78" width="1840" height="1035" preserveAspectRatio="xMidYMid slice" href="data:image/jpeg;base64,"/>
  <rect width="1600" height="900" fill="url(#blueWash)"/>
  <rect width="1600" height="900" fill="#02142e" opacity="0.18"/>

  <g filter="url(#glow)">
    <path class="light" d="M-120 742 C220 675 475 728 760 668 C1020 615 1260 650 1710 565" stroke="url(#energy)" stroke-width="18" stroke-linecap="round" fill="none" opacity="0.82"/>
    <path class="light two" d="M-160 805 C250 710 510 760 810 705 C1115 650 1320 694 1760 612" stroke="url(#energy)" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.72"/>
    <path class="pulse" d="M640 548 H760 L790 502 L836 615 L890 476 L932 548 H1085 L1120 520 L1162 590 L1212 492 L1260 548 H1450" stroke="url(#greenPulse)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
    <circle class="spark" cx="1048" cy="515" r="12" fill="#ffffff" opacity="0.9"/>
    <circle class="spark two" cx="1162" cy="590" r="10" fill="#49d05a" opacity="0.9"/>
    <circle class="spark three" cx="1246" cy="545" r="11" fill="#1fb5ff" opacity="0.9"/>
  </g>

  <rect x="0" y="0" width="760" height="900" fill="#061a43" opacity="0.28"/>
  <rect x="0" y="0" width="1600" height="900" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>
</svg>
