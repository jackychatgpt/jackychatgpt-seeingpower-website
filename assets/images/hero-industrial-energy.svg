<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Crisp industrial plant, chemical glassware and subtle moving energy light streaks">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#74c7ff"/>
      <stop offset="0.34" stop-color="#d9f1ff"/>
      <stop offset="0.62" stop-color="#b7d7e8"/>
      <stop offset="1" stop-color="#0d3f70"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c8d8e5"/>
      <stop offset="0.22" stop-color="#f8fbff"/>
      <stop offset="0.46" stop-color="#7b98ad"/>
      <stop offset="0.72" stop-color="#e8f1f7"/>
      <stop offset="1" stop-color="#526f86"/>
    </linearGradient>
    <linearGradient id="darkSteel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0f365a"/>
      <stop offset="0.3" stop-color="#4f7898"/>
      <stop offset="0.55" stop-color="#d7e4ec"/>
      <stop offset="0.78" stop-color="#37617f"/>
      <stop offset="1" stop-color="#092c4d"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="0.35" stop-color="#c9f4ff" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#0da8ff" stop-opacity="0.26"/>
    </linearGradient>
    <linearGradient id="liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#90f1ff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#008fd3" stop-opacity="0.82"/>
    </linearGradient>
    <linearGradient id="blueLight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1fb7ff" stop-opacity="0"/>
      <stop offset="0.35" stop-color="#6ee8ff" stop-opacity="0.95"/>
      <stop offset="0.52" stop-color="#ffffff" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#1fb7ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffac28" stop-opacity="0"/>
      <stop offset="0.38" stop-color="#ffb637" stop-opacity="0.95"/>
      <stop offset="0.58" stop-color="#fff3b0" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffac28" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="leftOnly" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#03142f" stop-opacity="0.42"/>
      <stop offset="0.26" stop-color="#03142f" stop-opacity="0.22"/>
      <stop offset="0.52" stop-color="#03142f" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#03142f" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#05223d" flood-opacity="0.32"/>
    </filter>
    <pattern id="rail" width="92" height="64" patternUnits="userSpaceOnUse">
      <path d="M0 52H92M0 31H92" stroke="#e6f4ff" stroke-opacity="0.45" stroke-width="3"/>
      <path d="M10 64V22M46 64V22M82 64V22" stroke="#17496f" stroke-opacity="0.45" stroke-width="5"/>
    </pattern>
    <style>
      .scene { animation: sceneBreath 10s ease-in-out infinite; transform-origin: 50% 50%; }
      .light1 { animation: lightMove1 10s ease-in-out infinite; }
      .light2 { animation: lightMove2 10s ease-in-out infinite; }
      .shine { animation: shine 5.5s ease-in-out infinite; }
      .bubble { animation: bubble 4.8s ease-in-out infinite; }
      .bubble.b2 { animation-delay: -1.6s; }
      .bubble.b3 { animation-delay: -3.0s; }
      @keyframes sceneBreath { 0%,100% { transform: scale(1.006); } 50% { transform: scale(1.014); } }
      @keyframes lightMove1 { 0%,100% { transform: translateX(-26px); opacity: .56; } 50% { transform: translateX(34px); opacity: .9; } }
      @keyframes lightMove2 { 0%,100% { transform: translateX(24px); opacity: .48; } 50% { transform: translateX(-30px); opacity: .82; } }
      @keyframes shine { 0%,100% { opacity: .28; transform: translateX(-8px); } 50% { opacity: .72; transform: translateX(10px); } }
      @keyframes bubble { 0%,100% { opacity: .24; transform: translateY(10px) scale(.86); } 50% { opacity: .7; transform: translateY(-6px) scale(1.08); } }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>
  <g opacity="0.78">
    <circle cx="480" cy="270" r="210" fill="#ffffff" opacity="0.55"/>
    <circle cx="600" cy="244" r="160" fill="#ffffff" opacity="0.38"/>
    <circle cx="270" cy="292" r="150" fill="#ffffff" opacity="0.3"/>
    <path d="M0 282C180 220 320 256 460 226C650 185 780 216 920 185C1120 140 1310 178 1600 120V0H0Z" fill="#ffffff" opacity="0.2"/>
  </g>
  <circle cx="548" cy="392" r="86" fill="#ffd27a" opacity="0.72" filter="url(#glow)"/>
  <circle cx="548" cy="392" r="34" fill="#fff6d0" opacity="0.88"/>

  <g class="scene" filter="url(#softShadow)">
    <g opacity="0.96">
      <rect x="688" y="258" width="42" height="405" fill="url(#darkSteel)" rx="10"/>
      <rect x="673" y="236" width="72" height="34" fill="url(#steel)" rx="12"/>
      <rect x="666" y="312" width="86" height="12" fill="#e9f5ff" opacity="0.76"/>
      <rect x="666" y="390" width="86" height="12" fill="#e9f5ff" opacity="0.76"/>
      <rect x="666" y="470" width="86" height="12" fill="#e9f5ff" opacity="0.76"/>
      <rect x="666" y="548" width="86" height="12" fill="#e9f5ff" opacity="0.76"/>
      <path d="M666 236H752M672 214H746M684 192H734" stroke="#0d3458" stroke-width="5" fill="none" opacity="0.8"/>
      <path d="M676 236v-54M742 236v-54" stroke="#17496f" stroke-width="5" opacity="0.72"/>
    </g>

    <g opacity="0.98">
      <rect x="980" y="175" width="92" height="500" fill="url(#steel)" rx="18"/>
      <ellipse cx="1026" cy="175" rx="46" ry="17" fill="#f6fbff"/>
      <ellipse cx="1026" cy="675" rx="46" ry="17" fill="#2a5774" opacity="0.7"/>
      <rect x="964" y="236" width="126" height="13" fill="#f7fbff" opacity="0.65"/>
      <rect x="964" y="365" width="126" height="13" fill="#f7fbff" opacity="0.65"/>
      <rect x="964" y="500" width="126" height="13" fill="#f7fbff" opacity="0.65"/>
      <path d="M960 230H1094M960 360H1094M960 494H1094" stroke="#0f4167" stroke-width="5" opacity="0.48"/>
      <path d="M946 188h160M948 162h156M966 134h122" stroke="#173d5d" stroke-width="6" fill="none"/>
      <path d="M958 188v-62M1094 188v-62" stroke="#173d5d" stroke-width="5"/>
    </g>

    <g opacity="0.96">
      <rect x="1210" y="98" width="156" height="606" fill="url(#steel)" rx="28"/>
      <ellipse cx="1288" cy="98" rx="78" ry="23" fill="#fbfdff"/>
      <ellipse cx="1288" cy="704" rx="78" ry="22" fill="#244a66" opacity="0.72"/>
      <path d="M1194 202h190M1194 354h190M1194 506h190" stroke="#0c3a5c" stroke-width="7" opacity="0.55"/>
      <path d="M1178 134h220M1182 94h212M1214 54h148" stroke="#0d3458" stroke-width="7" fill="none"/>
      <path d="M1186 134v-92M1390 134v-92" stroke="#123d61" stroke-width="6"/>
      <rect x="1164" y="264" width="260" height="36" fill="url(#rail)" opacity="0.78"/>
      <rect x="1152" y="442" width="278" height="36" fill="url(#rail)" opacity="0.78"/>
    </g>

    <g opacity="0.94">
      <rect x="812" y="330" width="68" height="350" fill="url(#steel)" rx="15"/>
      <ellipse cx="846" cy="330" rx="34" ry="13" fill="#fbfdff"/>
      <rect x="797" y="412" width="98" height="11" fill="#f5fbff" opacity="0.68"/>
      <rect x="797" y="528" width="98" height="11" fill="#f5fbff" opacity="0.68"/>
      <path d="M792 330h110M804 302h86M814 276h66" stroke="#173d5d" stroke-width="5" fill="none"/>
    </g>

    <path d="M578 466H1515" stroke="#d7e8f2" stroke-width="22" stroke-linecap="round" opacity="0.95"/>
    <path d="M566 456H1512" stroke="#0e3c62" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
    <path d="M742 588C850 514 980 520 1112 494C1234 470 1338 396 1518 416" stroke="#d9eef9" stroke-width="20" stroke-linecap="round" fill="none" opacity="0.93"/>
    <path d="M736 578C852 506 984 510 1110 486C1234 462 1330 388 1518 406" stroke="#0c3b60" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.74"/>

    <g opacity="0.84">
      <rect x="590" y="602" width="886" height="20" fill="#d8e8f0"/>
      <rect x="604" y="622" width="22" height="96" fill="#153d5d"/>
      <rect x="746" y="622" width="22" height="96" fill="#153d5d"/>
      <rect x="888" y="622" width="22" height="96" fill="#153d5d"/>
      <rect x="1030" y="622" width="22" height="96" fill="#153d5d"/>
      <rect x="1172" y="622" width="22" height="96" fill="#153d5d"/>
      <rect x="1314" y="622" width="22" height="96" fill="#153d5d"/>
      <path d="M570 636H1490M570 666H1490" stroke="#eaf8ff" stroke-width="5" opacity="0.68"/>
    </g>
  </g>

  <g transform="translate(930 568)" filter="url(#softShadow)">
    <g opacity="0.95">
      <path d="M70 38h54v172c0 44-34 80-78 80H-18c-44 0-78-36-78-80V38h54v164c0 18 14 32 32 32h50c18 0 30-14 30-32Z" fill="url(#glass)" stroke="#e9fbff" stroke-width="6"/>
      <rect x="-52" y="150" width="156" height="54" fill="url(#liquid)" opacity="0.78"/>
      <path d="M-48 74C-8 96 32 48 80 72" stroke="#ffffff" stroke-width="5" opacity="0.74" fill="none"/>
      <path class="shine" d="M-18 46V230" stroke="#ffffff" stroke-width="6" opacity="0.55"/>
    </g>
    <g transform="translate(210 18) scale(.86)" opacity="0.92">
      <rect x="-42" y="0" width="84" height="240" rx="22" fill="url(#glass)" stroke="#e9fbff" stroke-width="6"/>
      <rect x="-36" y="150" width="72" height="58" fill="url(#liquid)" opacity="0.72"/>
      <path class="shine" d="M-14 28V216" stroke="#ffffff" stroke-width="5" opacity="0.48"/>
    </g>
    <g transform="translate(340 30) scale(.74)" opacity="0.9">
      <rect x="-40" y="0" width="80" height="245" rx="18" fill="url(#glass)" stroke="#e9fbff" stroke-width="6"/>
      <rect x="-34" y="158" width="68" height="52" fill="url(#liquid)" opacity="0.7"/>
    </g>
  </g>

  <path d="M0 782C235 744 424 735 650 716C890 696 1050 652 1600 624V900H0Z" fill="#061a32" opacity="0.32"/>
  <g filter="url(#glow)">
    <path class="light1" d="M-180 654C120 652 368 648 648 638C930 628 1180 600 1770 574" stroke="url(#blueLight)" stroke-width="9" stroke-linecap="round" fill="none" opacity="0.74"/>
    <path class="light2" d="M-180 706C175 696 478 670 766 646C1050 622 1300 594 1770 574" stroke="url(#blueLight)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.55"/>
    <path class="light1" d="M-180 844C134 802 442 756 708 718C982 680 1240 642 1770 604" stroke="url(#goldLight)" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.72"/>
    <path class="light2" d="M-180 812C132 770 430 736 730 696C1030 656 1305 626 1770 598" stroke="#fff9d4" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.38"/>
    <circle class="bubble" cx="735" cy="636" r="8" fill="#8bf3ff" opacity="0.5"/>
    <circle class="bubble b2" cx="1040" cy="700" r="7" fill="#ffe59a" opacity="0.52"/>
    <circle class="bubble b3" cx="1252" cy="654" r="9" fill="#66e7ff" opacity="0.48"/>
  </g>

  <rect width="1600" height="900" fill="url(#leftOnly)"/>
</svg>
